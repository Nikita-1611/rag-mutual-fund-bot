name: RAG Ingestion Pipeline

on:
  schedule:
    # 03:45 UTC is 9:15 AM IST (Indian Standard Time)
    - cron: '45 03 * * *'
  # Allow manual triggering via GitHub UI
  workflow_dispatch:

jobs:
  scrape_and_ingest:
    name: Scraping Service
    runs-on: ubuntu-22.04
    
    env:
      # OPT-IN to Node.js 24 as requested to resolve deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Global secrets for the ingestion process
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      # Ensure Python finds the 'src' directory package
      PYTHONPATH: ${{ github.workspace }}/src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          
      - name: Debug Environment
        run: |
          pwd
          ls -R src/
          pip list
          
      - name: Run Master Ingestion Scheduler
        run: |
          # The Master Scheduler handles Cleanup -> Scrape -> Normalize -> Chunk -> Index
          python src/scheduler_local.py

      - name: Upload Ingestion Logs & Summary
        if: always() # Upload even if the run fails for debugging
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-summary-log
          path: logs/
          retention-days: 7
