services:
  - type: web
    name: sbi-mf-faq-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: src
      - key: PINECONE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        value: "us-east-1" # Update this to your actual Pinecone env if different
    healthCheckPath: /api/v1/health
    autoDeploy: true
